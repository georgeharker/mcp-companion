# Build and check the Nix flake (flake.nix). Validates that the bridge venv,
# the `mcp-bridge` application, and the Neovim plugin all build from a clean
# evaluation across Linux + macOS — the one thing that can't be verified by
# reading the flake. Runs on PRs that touch the flake or the packaged sources
# (e.g. PR #6), and is inert (skips cleanly) when no flake.nix is present.
name: nix

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "flake.nix"
      - "flake.lock"
      - "bridge/**"
      - "lua/**"
      - ".github/workflows/nix.yml"
  pull_request:
    paths:
      - "flake.nix"
      - "flake.lock"
      - "bridge/**"
      - "lua/**"
      - ".github/workflows/nix.yml"

concurrency:
  group: nix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      # Skip the rest of the job (rather than fail) when the flake hasn't
      # landed yet — keeps the workflow safe to merge ahead of PR #6.
      - name: Detect flake
        id: flake
        shell: bash
        run: |
          if [ -f flake.nix ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No flake.nix at this ref — skipping Nix build."
          fi

      - name: Install Nix
        if: steps.flake.outputs.present == 'true'
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Magic Nix Cache
        if: steps.flake.outputs.present == 'true'
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: flake check
        if: steps.flake.outputs.present == 'true'
        run: nix flake check --print-build-logs

      - name: build bridge + plugin
        if: steps.flake.outputs.present == 'true'
        run: |
          nix build --print-build-logs --no-link \
            .#mcp-bridge \
            .#mcp-bridge-bin \
            .#mcp-companion-nvim

      # Smoke-test the built bridge: the console script must at least parse args
      # and print help (proves the venv resolves fastmcp/pynvim and the entry
      # point is wired). `|| true` guards argparse's exit code on --help.
      - name: smoke-test mcp-bridge --help
        if: steps.flake.outputs.present == 'true'
        run: |
          out=$(nix run .#mcp-bridge-bin -- --help 2>&1 || true)
          echo "$out"
          echo "$out" | grep -q -- "--config" \
            || { echo "::error::mcp-bridge --help did not mention --config"; exit 1; }
