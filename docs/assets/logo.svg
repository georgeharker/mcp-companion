<svg xmlns="http://www.w3.org/2000/svg" width="976" height="560" viewBox="46 0 488 280" role="img" aria-label="mcp-companion: terminal and chat interfaces funnel through a hub into managed mcp servers">
  <defs>
    <marker id="arrowhead" markerWidth="22" markerHeight="13" refX="20" refY="6.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L22,6.5 L0,13 Z" fill="#8636C3"/>
    </marker>

    <linearGradient id="hubGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A3B47"/>
      <stop offset="1" stop-color="#141519"/>
    </linearGradient>
    <linearGradient id="hubBezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cardSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.42" stop-color="#FAFBFC"/>
      <stop offset="1" stop-color="#D6DAE1"/>
    </linearGradient>

    <radialGradient id="dotPurple" cx="0.35" cy="0.30" r="0.78">
      <stop offset="0" stop-color="#C49BEA"/>
      <stop offset="0.55" stop-color="#7A3FBF"/>
      <stop offset="1" stop-color="#4A2179"/>
    </radialGradient>
    <radialGradient id="dotMag" cx="0.35" cy="0.30" r="0.78">
      <stop offset="0" stop-color="#E2A0DF"/>
      <stop offset="0.55" stop-color="#B23BB0"/>
      <stop offset="1" stop-color="#74206E"/>
    </radialGradient>
    <radialGradient id="dotPink" cx="0.35" cy="0.30" r="0.78">
      <stop offset="0" stop-color="#F7A2C7"/>
      <stop offset="0.55" stop-color="#E0398A"/>
      <stop offset="1" stop-color="#9E1C5A"/>
    </radialGradient>

    <filter id="ds" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1A1B22" flood-opacity="0.40"/>
    </filter>
    <filter id="dsDot" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-color="#1A1B22" flood-opacity="0.55"/>
    </filter>
    <filter id="dsArrow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-color="#1A1B22" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- ===== flow arrows (behind nodes) ===== -->
  <g filter="url(#dsArrow)">
    <path d="M178,86 H210 C226,86 226,124 240,124 H262" fill="none" stroke="#7A3FBF" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowhead)"/>
    <path d="M178,190 H210 C226,190 226,156 240,156 H262" fill="none" stroke="#7A3FBF" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowhead)"/>
    <path d="M338,124 H370 C386,124 386,63 400,63 H424" fill="none" stroke="#9333C7" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowhead)"/>
    <path d="M338,140 H424" fill="none" stroke="#9333C7" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowhead)"/>
    <path d="M338,156 H370 C386,156 386,217 400,217 H424" fill="none" stroke="#9333C7" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowhead)"/>
  </g>

  <!-- ===== hub: glossy charcoal squircle + bullseye cutout ===== -->
  <path d="M284,100 H316 A24,24 0 0 1 340,124 V156 A24,24 0 0 1 316,180 H284 A24,24 0 0 1 260,156 V124 A24,24 0 0 1 284,100 Z" fill="url(#hubGrad)" filter="url(#ds)"/>
  <ellipse cx="300" cy="120" rx="32" ry="13" fill="#ffffff" opacity="0.10"/>
  <path d="M284,100 H316 A24,24 0 0 1 340,124 V156 A24,24 0 0 1 316,180 H284 A24,24 0 0 1 260,156 V124 A24,24 0 0 1 284,100 Z" fill="none" stroke="url(#hubBezel)" stroke-width="2"/>
  <circle cx="300" cy="140" r="15" fill="none" stroke="#ffffff" stroke-width="3"/>
  <circle cx="300" cy="140" r="5" fill="#ffffff"/>

  <!-- ===== terminal interface ===== -->
  <path d="M84,56 H166 A14,14 0 0 1 180,70 V102 A14,14 0 0 1 166,116 H84 A14,14 0 0 1 70,102 V70 A14,14 0 0 1 84,56 Z" fill="url(#cardSheen)" stroke="#1A1B22" stroke-width="2.5" filter="url(#ds)"/>
  <path d="M76,80 H174" fill="none" stroke="#1A1B22" stroke-width="1" opacity="0.18"/>
  <circle cx="85" cy="70" r="4.5" fill="url(#dotPink)" stroke="#000" stroke-opacity="0.18" stroke-width="0.8" filter="url(#dsDot)"/>
  <circle cx="99" cy="70" r="4.5" fill="url(#dotMag)" stroke="#000" stroke-opacity="0.18" stroke-width="0.8" filter="url(#dsDot)"/>
  <circle cx="113" cy="70" r="4.5" fill="url(#dotPurple)" stroke="#000" stroke-opacity="0.18" stroke-width="0.8" filter="url(#dsDot)"/>
  <ellipse cx="83.7" cy="68.5" rx="1.9" ry="1.35" fill="#fff" opacity="0.55"/>
  <ellipse cx="97.7" cy="68.5" rx="1.9" ry="1.35" fill="#fff" opacity="0.55"/>
  <ellipse cx="111.7" cy="68.5" rx="1.9" ry="1.35" fill="#fff" opacity="0.55"/>
  <path d="M 90.548 105.194 V 101.736 L 97.438 97.42 V 97.316 L 90.548 93 V 89.542 L 100.584 96.042 V 98.694 Z M 105.16 110.264 V 107.404 H 117.64 V 110.264 Z" fill="#1A1B22"/>

  <!-- ===== chat interface ===== -->
  <path d="M90,160 H160 A20,20 0 0 1 180,180 V200 A20,20 0 0 1 160,220 H102 L90,232 L92,220 H90 A20,20 0 0 1 70,200 V180 A20,20 0 0 1 90,160 Z" fill="url(#cardSheen)" stroke="#1A1B22" stroke-width="2.5" filter="url(#ds)"/>
  <circle cx="99" cy="190" r="6.5" fill="url(#dotPurple)" stroke="#000" stroke-opacity="0.18" stroke-width="0.9" filter="url(#dsDot)"/>
  <circle cx="117" cy="190" r="6.5" fill="url(#dotMag)" stroke="#000" stroke-opacity="0.18" stroke-width="0.9" filter="url(#dsDot)"/>
  <circle cx="135" cy="190" r="6.5" fill="url(#dotPink)" stroke="#000" stroke-opacity="0.18" stroke-width="0.9" filter="url(#dsDot)"/>
  <ellipse cx="97.2" cy="187.8" rx="2.7" ry="1.95" fill="#fff" opacity="0.55"/>
  <ellipse cx="115.2" cy="187.8" rx="2.7" ry="1.95" fill="#fff" opacity="0.55"/>
  <ellipse cx="133.2" cy="187.8" rx="2.7" ry="1.95" fill="#fff" opacity="0.55"/>

  <!-- ===== managed mcp servers ===== -->
  <path d="M432,40 H500 A12,12 0 0 1 512,52 V74 A12,12 0 0 1 500,86 H432 A12,12 0 0 1 420,74 V52 A12,12 0 0 1 432,40 Z" fill="url(#cardSheen)" stroke="#1A1B22" stroke-width="3.5" filter="url(#ds)"/>
  <path d="M432,117 H500 A12,12 0 0 1 512,129 V151 A12,12 0 0 1 500,163 H432 A12,12 0 0 1 420,151 V129 A12,12 0 0 1 432,117 Z" fill="url(#cardSheen)" stroke="#1A1B22" stroke-width="3.5" filter="url(#ds)"/>
  <path d="M432,194 H500 A12,12 0 0 1 512,206 V228 A12,12 0 0 1 500,240 H432 A12,12 0 0 1 420,228 V206 A12,12 0 0 1 432,194 Z" fill="url(#cardSheen)" stroke="#1A1B22" stroke-width="3.5" filter="url(#ds)"/>
  <circle cx="435" cy="63" r="6" fill="url(#dotPurple)" stroke="#000" stroke-opacity="0.18" stroke-width="0.9" filter="url(#dsDot)"/>
  <circle cx="435" cy="140" r="6" fill="url(#dotMag)" stroke="#000" stroke-opacity="0.18" stroke-width="0.9" filter="url(#dsDot)"/>
  <circle cx="435" cy="217" r="6" fill="url(#dotPink)" stroke="#000" stroke-opacity="0.18" stroke-width="0.9" filter="url(#dsDot)"/>
  <ellipse cx="433.3" cy="61" rx="2.5" ry="1.8" fill="#fff" opacity="0.55"/>
  <ellipse cx="433.3" cy="138" rx="2.5" ry="1.8" fill="#fff" opacity="0.55"/>
  <ellipse cx="433.3" cy="215" rx="2.5" ry="1.8" fill="#fff" opacity="0.55"/>
