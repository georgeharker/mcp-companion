<svg xmlns="http://www.w3.org/2000/svg" width="800" height="440" viewBox="0 0 800 440" role="img" aria-label="MCP Combiner aggregates servers behind one HTTP endpoint, serving the Neovim plugin, OpenCode, and any HTTP client">
  <defs>
    <marker id="ah" markerWidth="20" markerHeight="12" refX="18" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L20,6 L0,12 Z" fill="#8636C3"/>
    </marker>
    <linearGradient id="hubGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A3B47"/>
      <stop offset="1" stop-color="#141519"/>
    </linearGradient>
    <linearGradient id="hubBezel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cardSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.42" stop-color="#FAFBFC"/>
      <stop offset="1" stop-color="#D6DAE1"/>
    </linearGradient>
    <radialGradient id="dotPurple" cx="0.35" cy="0.30" r="0.78">
      <stop offset="0" stop-color="#C49BEA"/><stop offset="0.55" stop-color="#7A3FBF"/><stop offset="1" stop-color="#4A2179"/>
    </radialGradient>
    <radialGradient id="dotMag" cx="0.35" cy="0.30" r="0.78">
      <stop offset="0" stop-color="#E2A0DF"/><stop offset="0.55" stop-color="#B23BB0"/><stop offset="1" stop-color="#74206E"/>
    </radialGradient>
    <radialGradient id="dotPink" cx="0.35" cy="0.30" r="0.78">
      <stop offset="0" stop-color="#F7A2C7"/><stop offset="0.55" stop-color="#E0398A"/><stop offset="1" stop-color="#9E1C5A"/>
    </radialGradient>
    <filter id="ds" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1A1B22" flood-opacity="0.34"/>
    </filter>
    <filter id="dsDot" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.2" flood-color="#1A1B22" flood-opacity="0.5"/>
    </filter>
    <filter id="dsArrow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.2" flood-color="#1A1B22" flood-opacity="0.16"/>
    </filter>
  </defs>

  <!-- ===== flow: combiner -> endpoint -> clients ===== -->
  <g filter="url(#dsArrow)">
    <path d="M400,184 V200" fill="none" stroke="#8636C3" stroke-width="4.5" stroke-linecap="round"/>
    <path d="M400,228 C400,246 160,246 160,260" fill="none" stroke="#8636C3" stroke-width="4.5" stroke-linecap="round" marker-end="url(#ah)"/>
    <path d="M400,228 V260" fill="none" stroke="#8636C3" stroke-width="4.5" stroke-linecap="round" marker-end="url(#ah)"/>
    <path d="M400,228 C400,246 640,246 640,260" fill="none" stroke="#8636C3" stroke-width="4.5" stroke-linecap="round" marker-end="url(#ah)"/>
  </g>

  <!-- ===== combiner card ===== -->
  <path d="M152,36 H648 A18,18 0 0 1 666,54 V166 A18,18 0 0 1 648,184 H152 A18,18 0 0 1 134,166 V54 A18,18 0 0 1 152,36 Z" fill="url(#cardSheen)" stroke="#1A1B22" stroke-width="3" filter="url(#ds)"/>
  <!-- hub badge -->
  <path d="M170,72 H198 A14,14 0 0 1 212,86 V108 A14,14 0 0 1 198,122 H170 A14,14 0 0 1 156,108 V86 A14,14 0 0 1 170,72 Z" fill="url(#hubGrad)"/>
  <path d="M170,72 H198 A14,14 0 0 1 212,86 V108 A14,14 0 0 1 198,122 H170 A14,14 0 0 1 156,108 V86 A14,14 0 0 1 170,72 Z" fill="none" stroke="url(#hubBezel)" stroke-width="1.5"/>
  <circle cx="184" cy="97" r="11" fill="none" stroke="#ffffff" stroke-width="2.4"/>
  <circle cx="184" cy="97" r="3.6" fill="#ffffff"/>
  <!-- titles -->
  <text x="232" y="90" font-family="Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="24" fill="#1A1B22">MCP Combiner</text>
  <text x="234" y="112" font-family="Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="14" fill="#6E6E78">Python · standalone · one HTTP endpoint</text>
  <path d="M158,132 H642" stroke="#1A1B22" stroke-width="1" opacity="0.12"/>
  <text x="158" y="153" font-family="Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="14" fill="#2A2B30">Aggregates N MCP servers</text>
  <path d="M340,148.5 H356" stroke="#8636C3" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M354,144.5 L360,148.5 L354,152.5 Z" fill="#8636C3"/>
  <text x="368" y="153" font-family="Helvetica Neue, Arial, sans-serif" font-weight="600" font-size="14" fill="#2A2B30">tools, resources &amp; prompts</text>
  <text x="158" y="172" font-family="Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="13" fill="#6E6E78">Auth · env interpolation · meta-tools · health API</text>

  <!-- ===== :9741 endpoint pill ===== -->
  <path d="M348,200 H452 A14,14 0 0 1 466,214 A14,14 0 0 1 452,228 H348 A14,14 0 0 1 334,214 A14,14 0 0 1 348,200 Z" fill="url(#hubGrad)" filter="url(#dsDot)"/>
  <path d="M348,200 H452 A14,14 0 0 1 466,214 A14,14 0 0 1 452,228 H348 A14,14 0 0 1 334,214 A14,14 0 0 1 348,200 Z" fill="none" stroke="url(#hubBezel)" stroke-width="1.3"/>
  <text x="400" y="219" font-family="Source Code Pro, monospace" font-weight="700" font-size="14" fill="#ffffff" text-anchor="middle">HTTP :9741</text>

  <!-- ===== client cards ===== -->
  <!-- neovim -->
  <path d="M71,264 H249 A16,16 0 0 1 265,280 V356 A16,16 0 0 1 249,372 H71 A16,16 0 0 1 55,356 V280 A16,16 0 0 1 71,264 Z" fill="url(#cardSheen)" stroke="#1A1B22" stroke-width="2.6" filter="url(#ds)"/>
  <circle cx="160" cy="298" r="7" fill="url(#dotPurple)" stroke="#000" stroke-opacity="0.18" stroke-width="0.9" filter="url(#dsDot)"/>
  <ellipse cx="158" cy="295.6" rx="2.9" ry="2.1" fill="#fff" opacity="0.55"/>
  <text x="160" y="330" font-family="Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="17" fill="#1A1B22" text-anchor="middle">Neovim plugin</text>
  <text x="160" y="351" font-family="Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="13" fill="#6E6E78" text-anchor="middle">CodeCompanion</text>

  <!-- opencode -->
  <path d="M311,264 H489 A16,16 0 0 1 505,280 V356 A16,16 0 0 1 489,372 H311 A16,16 0 0 1 295,356 V280 A16,16 0 0 1 311,264 Z" fill="url(#cardSheen)" stroke="#1A1B22" stroke-width="2.6" filter="url(#ds)"/>
  <circle cx="400" cy="298" r="7" fill="url(#dotMag)" stroke="#000" stroke-opacity="0.18" stroke-width="0.9" filter="url(#dsDot)"/>
  <ellipse cx="398" cy="295.6" rx="2.9" ry="2.1" fill="#fff" opacity="0.55"/>
  <text x="400" y="330" font-family="Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="17" fill="#1A1B22" text-anchor="middle">OpenCode</text>
  <text x="400" y="351" font-family="Helvetica Neue, Arial, sans-serif" font-weight="400" font-size="13" fill="#6E6E78" text-anchor="middle">ACP agent</text>

  <!-- any http client -->
  <path d="M551,264 H729 A16,16 0 0 1 745,280 V356 A16,16 0 0 1 729,372 H551 A16,16 0 0 1 535,356 V280 A16,16 0 0 1 551,264 Z" fill="url(#cardSheen)" stroke="#1A1B22" stroke-width="2.6" filter="url(#ds)"/>
  <circle cx="640" cy="298" r="7" fill="url(#dotPink)" stroke="#000" stroke-opacity="0.18" stroke-width="0.9" filter="url(#dsDot)"/>
  <ellipse cx="638" cy="295.6" rx="2.9" ry="2.1" fill="#fff" opacity="0.55"/>
  <text x="640" y="330" font-family="Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="17" fill="#1A1B22" text-anchor="middle">Any HTTP client</text>
  <text x="640" y="351" font-family="Source Code Pro, monospace" font-weight="400" font-size="13" fill="#6E6E78" text-anchor="middle">curl · scripts</text>
</svg>
